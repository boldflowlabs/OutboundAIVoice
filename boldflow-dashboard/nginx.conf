server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Python backend
    location /api/ {
        proxy_redirect off;
        proxy_pass http://hxerhakkt4si42icocg0z855.72.62.227.227.sslip.io/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
