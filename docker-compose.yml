version: "3.8"
services:
  outboundai:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  dashboard:
    build: ./boldflow-dashboard
    restart: unless-stopped
    depends_on:
      - outboundai
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
