version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outbound_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: bash start.sh

  frontend:
    build:
      context: ./boldflow-dashboard
      dockerfile: Dockerfile
    container_name: outbound_frontend
    restart: unless-stopped
    ports:
      - "3000:80"       # Nginx inside container runs on 80
    depends_on:
      - backend